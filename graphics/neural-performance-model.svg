<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Calibri, sans-serif">
  <defs>
    <linearGradient id="bgGrad4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080F1A"/>
      <stop offset="100%" stop-color="#0D1E30"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad4)" rx="8"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#C9A84C" font-size="13" letter-spacing="4" font-weight="bold">THE NEURAL PERFORMANCE MODEL</text>
  <line x1="220" y1="55" x2="580" y2="55" stroke="#C9A84C" stroke-width="0.5" opacity="0.6"/>
  <text x="400" y="72" text-anchor="middle" fill="#8A9AB5" font-size="11">Seven Stages of the Performance Arc</text>

  <!-- Stage 1: PRIME -->
  <rect x="40" y="100" width="100" height="100" rx="6" fill="#0D1E30" stroke="#1A8FA8" stroke-width="2"/>
  <text x="90" y="122" text-anchor="middle" fill="#1A8FA8" font-size="22" font-weight="bold">01</text>
  <text x="90" y="142" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">PRIME</text>
  <text x="90" y="158" text-anchor="middle" fill="#8A9AB5" font-size="8">Set the</text>
  <text x="90" y="168" text-anchor="middle" fill="#8A9AB5" font-size="8">environment</text>
  <text x="90" y="178" text-anchor="middle" fill="#8A9AB5" font-size="8">before arrival</text>

  <!-- Arrow -->
  <line x1="145" y1="150" x2="155" y2="150" stroke="#3A4A5C" stroke-width="1.5"/>
  <polygon points="155,146 163,150 155,154" fill="#3A4A5C"/>

  <!-- Stage 2: SIGNAL -->
  <rect x="165" y="100" width="100" height="100" rx="6" fill="#0D1E30" stroke="#1A8FA8" stroke-width="2"/>
  <text x="215" y="122" text-anchor="middle" fill="#1A8FA8" font-size="22" font-weight="bold">02</text>
  <text x="215" y="142" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">SIGNAL</text>
  <text x="215" y="158" text-anchor="middle" fill="#8A9AB5" font-size="8">First behavioral</text>
  <text x="215" y="168" text-anchor="middle" fill="#8A9AB5" font-size="8">signal before</text>
  <text x="215" y="178" text-anchor="middle" fill="#8A9AB5" font-size="8">you speak</text>

  <!-- Arrow -->
  <line x1="270" y1="150" x2="280" y2="150" stroke="#3A4A5C" stroke-width="1.5"/>
  <polygon points="280,146 288,150 280,154" fill="#3A4A5C"/>

  <!-- Stage 3: TENSION -->
  <rect x="290" y="100" width="100" height="100" rx="6" fill="#0D1E30" stroke="#E8C870" stroke-width="2"/>
  <text x="340" y="122" text-anchor="middle" fill="#E8C870" font-size="22" font-weight="bold">03</text>
  <text x="340" y="142" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">TENSION</text>
  <text x="340" y="158" text-anchor="middle" fill="#8A9AB5" font-size="8">Productive</text>
  <text x="340" y="168" text-anchor="middle" fill="#8A9AB5" font-size="8">uncertainty</text>
  <text x="340" y="178" text-anchor="middle" fill="#8A9AB5" font-size="8">in the gap</text>

  <!-- Arrow -->
  <line x1="395" y1="150" x2="405" y2="150" stroke="#3A4A5C" stroke-width="1.5"/>
  <polygon points="405,146 413,150 405,154" fill="#3A4A5C"/>

  <!-- Stage 4: ANCHOR -->
  <rect x="415" y="100" width="100" height="100" rx="6" fill="#0D1E30" stroke="#E8C870" stroke-width="2"/>
  <text x="465" y="122" text-anchor="middle" fill="#E8C870" font-size="22" font-weight="bold">04</text>
  <text x="465" y="142" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">ANCHOR</text>
  <text x="465" y="158" text-anchor="middle" fill="#8A9AB5" font-size="8">Plant the</text>
  <text x="465" y="168" text-anchor="middle" fill="#8A9AB5" font-size="8">cognitive</text>
  <text x="465" y="178" text-anchor="middle" fill="#8A9AB5" font-size="8">anchor</text>

  <!-- Arrow -->
  <line x1="520" y1="150" x2="530" y2="150" stroke="#3A4A5C" stroke-width="1.5"/>
  <polygon points="530,146 538,150 530,154" fill="#3A4A5C"/>

  <!-- Stage 5: ESCALATE (highlighted - most common failure) -->
  <rect x="540" y="96" width="100" height="108" rx="6" fill="#0D1E30" stroke="#A83030" stroke-width="3"/>
  <text x="590" y="118" text-anchor="middle" fill="#A83030" font-size="22" font-weight="bold">05</text>
  <text x="590" y="138" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">ESCALATE</text>
  <text x="590" y="154" text-anchor="middle" fill="#8A9AB5" font-size="8">Delay the</text>
  <text x="590" y="164" text-anchor="middle" fill="#8A9AB5" font-size="8">payoff. Trust</text>
  <text x="590" y="174" text-anchor="middle" fill="#8A9AB5" font-size="8">the discomfort.</text>
  <text x="590" y="192" text-anchor="middle" fill="#A83030" font-size="7" font-weight="bold">MOST COMMON</text>
  <text x="590" y="200" text-anchor="middle" fill="#A83030" font-size="7" font-weight="bold">FAILURE POINT</text>

  <!-- Arrow -->
  <line x1="645" y1="150" x2="655" y2="150" stroke="#3A4A5C" stroke-width="1.5"/>
  <polygon points="655,146 663,150 655,154" fill="#3A4A5C"/>

  <!-- Stage 6: RELEASE -->
  <rect x="665" y="100" width="100" height="100" rx="6" fill="#0D1E30" stroke="#6B52A0" stroke-width="2"/>
  <text x="715" y="122" text-anchor="middle" fill="#6B52A0" font-size="22" font-weight="bold">06</text>
  <text x="715" y="142" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">RELEASE</text>
  <text x="715" y="158" text-anchor="middle" fill="#8A9AB5" font-size="8">Deliver with</text>
  <text x="715" y="168" text-anchor="middle" fill="#8A9AB5" font-size="8">precision.</text>
  <text x="715" y="178" text-anchor="middle" fill="#8A9AB5" font-size="8">Do not explain.</text>

  <!-- Stage 7: EMBED (below, centered) -->
  <line x1="400" y1="204" x2="400" y2="240" stroke="#3A4A5C" stroke-width="1.5"/>
  <polygon points="396,238 400,246 404,238" fill="#3A4A5C"/>
  <rect x="300" y="248" width="200" height="80" rx="6" fill="#0D1E30" stroke="#C9A84C" stroke-width="2"/>
  <text x="400" y="272" text-anchor="middle" fill="#C9A84C" font-size="22" font-weight="bold">07</text>
  <text x="400" y="292" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold">EMBED</text>
  <text x="400" y="310" text-anchor="middle" fill="#8A9AB5" font-size="9">The last 2 minutes are the most neurobiologically important</text>

  <!-- Neurochemistry mapping -->
  <text x="400" y="365" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">NEUROCHEMICAL MAPPING</text>

  <!-- Dopamine bar -->
  <text x="130" y="395" text-anchor="end" fill="#E8C870" font-size="10" font-weight="bold">DOPAMINE</text>
  <rect x="140" y="384" width="60" height="14" rx="2" fill="#E8C870" opacity="0.15"/>
  <rect x="200" y="384" width="120" height="14" rx="2" fill="#E8C870" opacity="0.3"/>
  <rect x="320" y="384" width="200" height="14" rx="2" fill="#E8C870" opacity="0.6"/>
  <rect x="520" y="384" width="100" height="14" rx="2" fill="#E8C870" opacity="0.9"/>
  <rect x="620" y="384" width="60" height="14" rx="2" fill="#E8C870" opacity="0.3"/>
  <rect x="680" y="384" width="40" height="14" rx="2" fill="#E8C870" opacity="0.15"/>

  <!-- Cortisol bar -->
  <text x="130" y="420" text-anchor="end" fill="#A83030" font-size="10" font-weight="bold">CORTISOL</text>
  <rect x="140" y="409" width="60" height="14" rx="2" fill="#A83030" opacity="0.1"/>
  <rect x="200" y="409" width="120" height="14" rx="2" fill="#A83030" opacity="0.2"/>
  <rect x="320" y="409" width="200" height="14" rx="2" fill="#A83030" opacity="0.4"/>
  <rect x="520" y="409" width="100" height="14" rx="2" fill="#A83030" opacity="0.7"/>
  <rect x="620" y="409" width="60" height="14" rx="2" fill="#A83030" opacity="0.3"/>
  <rect x="680" y="409" width="40" height="14" rx="2" fill="#A83030" opacity="0.1"/>

  <!-- Attention bar -->
  <text x="130" y="445" text-anchor="end" fill="#1A8FA8" font-size="10" font-weight="bold">ATTENTION</text>
  <rect x="140" y="434" width="60" height="14" rx="2" fill="#1A8FA8" opacity="0.2"/>
  <rect x="200" y="434" width="120" height="14" rx="2" fill="#1A8FA8" opacity="0.5"/>
  <rect x="320" y="434" width="200" height="14" rx="2" fill="#1A8FA8" opacity="0.8"/>
  <rect x="520" y="434" width="100" height="14" rx="2" fill="#1A8FA8" opacity="0.95"/>
  <rect x="620" y="434" width="60" height="14" rx="2" fill="#1A8FA8" opacity="0.6"/>
  <rect x="680" y="434" width="40" height="14" rx="2" fill="#1A8FA8" opacity="0.4"/>

  <!-- Stage labels under bars -->
  <text x="170" y="468" text-anchor="middle" fill="#3A4A5C" font-size="8">01-02</text>
  <text x="260" y="468" text-anchor="middle" fill="#3A4A5C" font-size="8">03</text>
  <text x="420" y="468" text-anchor="middle" fill="#3A4A5C" font-size="8">04-05</text>
  <text x="570" y="468" text-anchor="middle" fill="#3A4A5C" font-size="8">05-06</text>
  <text x="650" y="468" text-anchor="middle" fill="#3A4A5C" font-size="8">06</text>
  <text x="700" y="468" text-anchor="middle" fill="#3A4A5C" font-size="8">07</text>

  <!-- Design note -->
  <text x="400" y="500" text-anchor="middle" fill="#C9A84C" font-size="9" font-style="italic">Design backward from Stage 07 first. Most common failure: Stage 05 — resolving tension before it peaks.</text>

  <!-- Credits -->
  <text x="400" y="580" text-anchor="middle" fill="#3A4A5C" font-size="8">THE ARCHITECTURE OF WONDER  |  DECODE BEHAVIOR</text>
</svg>