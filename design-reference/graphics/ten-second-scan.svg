<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Calibri, sans-serif">
  <defs>
    <linearGradient id="bgGrad9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080F1A"/>
      <stop offset="100%" stop-color="#0D1E30"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bgGrad9)" rx="8"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#C9A84C" font-size="13" letter-spacing="4" font-weight="bold">THE 10-SECOND SCAN</text>
  <line x1="280" y1="55" x2="520" y2="55" stroke="#C9A84C" stroke-width="0.5" opacity="0.6"/>
  <text x="400" y="72" text-anchor="middle" fill="#8A9AB5" font-size="11">Ten seconds. Five data points. One read.</text>

  <!-- Step 1: SHOES -->
  <rect x="40" y="100" width="135" height="210" rx="6" fill="#0D1E30" stroke="#1A8FA8" stroke-width="2"/>
  <circle cx="107" cy="128" r="18" fill="#1A8FA8" opacity="0.15" stroke="#1A8FA8" stroke-width="1.5"/>
  <text x="107" y="134" text-anchor="middle" fill="#1A8FA8" font-size="16" font-weight="bold">01</text>
  <text x="107" y="165" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">SHOES</text>
  <line x1="55" y1="174" x2="160" y2="174" stroke="#1A8FA8" stroke-width="0.5" opacity="0.3"/>
  <text x="55" y="192" fill="#E8C870" font-size="8.5" font-weight="bold">NOTICE</text>
  <text x="55" y="206" fill="#8A9AB5" font-size="8.5">Condition · Style</text>
  <text x="55" y="218" fill="#8A9AB5" font-size="8.5">Brand level</text>
  <text x="55" y="240" fill="#E8C870" font-size="8.5" font-weight="bold">TELLS YOU</text>
  <text x="55" y="254" fill="#8A9AB5" font-size="8.5">Investment in appearance</text>
  <text x="55" y="266" fill="#8A9AB5" font-size="8.5">Likely profession</text>
  <text x="55" y="278" fill="#8A9AB5" font-size="8.5">Economic background</text>
  <text x="55" y="298" fill="#3A4A5C" font-size="7.5" font-style="italic">Furthest from the face:</text>
  <text x="55" y="308" fill="#3A4A5C" font-size="7.5" font-style="italic">most honest part</text>

  <!-- Arrow -->
  <text x="183" y="205" fill="#3A4A5C" font-size="16">&gt;</text>

  <!-- Step 2: HANDS -->
  <rect x="193" y="100" width="135" height="210" rx="6" fill="#0D1E30" stroke="#E8C870" stroke-width="2"/>
  <circle cx="260" cy="128" r="18" fill="#E8C870" opacity="0.12" stroke="#E8C870" stroke-width="1.5"/>
  <text x="260" y="134" text-anchor="middle" fill="#E8C870" font-size="16" font-weight="bold">02</text>
  <text x="260" y="165" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">HANDS</text>
  <line x1="208" y1="174" x2="313" y2="174" stroke="#E8C870" stroke-width="0.5" opacity="0.3"/>
  <text x="208" y="192" fill="#E8C870" font-size="8.5" font-weight="bold">NOTICE</text>
  <text x="208" y="206" fill="#8A9AB5" font-size="8.5">Calluses · Nails</text>
  <text x="208" y="218" fill="#8A9AB5" font-size="8.5">Rings · Wear patterns</text>
  <text x="208" y="240" fill="#E8C870" font-size="8.5" font-weight="bold">TELLS YOU</text>
  <text x="208" y="254" fill="#8A9AB5" font-size="8.5">Occupation signals</text>
  <text x="208" y="266" fill="#8A9AB5" font-size="8.5">Stress level</text>
  <text x="208" y="278" fill="#8A9AB5" font-size="8.5">Self-care</text>
  <text x="208" y="298" fill="#3A4A5C" font-size="7.5" font-style="italic">Hands tell a story the</text>
  <text x="208" y="308" fill="#3A4A5C" font-size="7.5" font-style="italic">face has learned to conceal</text>

  <!-- Arrow -->
  <text x="336" y="205" fill="#3A4A5C" font-size="16">&gt;</text>

  <!-- Step 3: EYES -->
  <rect x="346" y="100" width="135" height="210" rx="6" fill="#0D1E30" stroke="#A83030" stroke-width="2"/>
  <circle cx="413" cy="128" r="18" fill="#A83030" opacity="0.12" stroke="#A83030" stroke-width="1.5"/>
  <text x="413" y="134" text-anchor="middle" fill="#A83030" font-size="16" font-weight="bold">03</text>
  <text x="413" y="165" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">EYES</text>
  <line x1="361" y1="174" x2="466" y2="174" stroke="#A83030" stroke-width="0.5" opacity="0.3"/>
  <text x="361" y="192" fill="#E8C870" font-size="8.5" font-weight="bold">NOTICE</text>
  <text x="361" y="206" fill="#8A9AB5" font-size="8.5">Eye contact? Blink rate?</text>
  <text x="361" y="218" fill="#8A9AB5" font-size="8.5">Curious or guarded?</text>
  <text x="361" y="240" fill="#E8C870" font-size="8.5" font-weight="bold">TELLS YOU</text>
  <text x="361" y="254" fill="#8A9AB5" font-size="8.5">Confidence level</text>
  <text x="361" y="266" fill="#8A9AB5" font-size="8.5">Compliance or</text>
  <text x="361" y="278" fill="#8A9AB5" font-size="8.5">resistance</text>
  <text x="361" y="298" fill="#3A4A5C" font-size="7.5" font-style="italic">Supporter vs Challenger</text>
  <text x="361" y="308" fill="#3A4A5C" font-size="7.5" font-style="italic">visible right here</text>

  <!-- Arrow -->
  <text x="489" y="205" fill="#3A4A5C" font-size="16">&gt;</text>

  <!-- Step 4: POSTURE -->
  <rect x="499" y="100" width="135" height="210" rx="6" fill="#0D1E30" stroke="#6B52A0" stroke-width="2"/>
  <circle cx="566" cy="128" r="18" fill="#6B52A0" opacity="0.12" stroke="#6B52A0" stroke-width="1.5"/>
  <text x="566" y="134" text-anchor="middle" fill="#6B52A0" font-size="16" font-weight="bold">04</text>
  <text x="566" y="165" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold">POSTURE</text>
  <line x1="514" y1="174" x2="619" y2="174" stroke="#6B52A0" stroke-width="0.5" opacity="0.3"/>
  <text x="514" y="192" fill="#E8C870" font-size="8.5" font-weight="bold">NOTICE</text>
  <text x="514" y="206" fill="#8A9AB5" font-size="8.5">Lean in or back?</text>
  <text x="514" y="218" fill="#8A9AB5" font-size="8.5">Shoulders? Weight?</text>
  <text x="514" y="240" fill="#E8C870" font-size="8.5" font-weight="bold">TELLS YOU</text>
  <text x="514" y="254" fill="#8A9AB5" font-size="8.5">Dominance or</text>
  <text x="514" y="266" fill="#8A9AB5" font-size="8.5">deference</text>
  <text x="514" y="278" fill="#8A9AB5" font-size="8.5">Overall confidence</text>
  <text x="514" y="298" fill="#3A4A5C" font-size="7.5" font-style="italic">The body's honest</text>
  <text x="514" y="308" fill="#3A4A5C" font-size="7.5" font-style="italic">summary of everything</text>

  <!-- Arrow -->
  <text x="642" y="205" fill="#3A4A5C" font-size="16">&gt;</text>

  <!-- Step 5: ENERGY -->
  <rect x="652" y="100" width="135" height="210" rx="6" fill="#0D1E30" stroke="#C9A84C" stroke-width="2"/>
  <circle cx="719" cy="128" r="18" fill="#C9A84C" opacity="0.12" stroke="#C9A84C" stroke-width="1.5"/>
  <text x="719" y="134" text-anchor="middle" fill="#C9A84C" font-size="16" font-weight="bold">05</text>
  <text x="719" y="165" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">ENERGY</text>
  <line x1="667" y1="174" x2="772" y2="174" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
  <text x="667" y="192" fill="#E8C870" font-size="8.5" font-weight="bold">NOTICE</text>
  <text x="667" y="206" fill="#8A9AB5" font-size="8.5">Smiling? Animated?</text>
  <text x="667" y="218" fill="#8A9AB5" font-size="8.5">Eye contact w/ room?</text>
  <text x="667" y="240" fill="#E8C870" font-size="8.5" font-weight="bold">TELLS YOU</text>
  <text x="667" y="254" fill="#8A9AB5" font-size="8.5">How reactive they'll</text>
  <text x="667" y="266" fill="#8A9AB5" font-size="8.5">be when something</text>
  <text x="667" y="278" fill="#8A9AB5" font-size="8.5">impossible happens</text>
  <text x="667" y="298" fill="#3A4A5C" font-size="7.5" font-style="italic">This is the number the</text>
  <text x="667" y="308" fill="#3A4A5C" font-size="7.5" font-style="italic">whole scan builds toward</text>

  <!-- Bottom rule -->
  <rect x="100" y="340" width="600" height="50" rx="4" fill="#C9A84C" opacity="0.08"/>
  <text x="400" y="362" text-anchor="middle" fill="#C9A84C" font-size="11" font-weight="bold">When you have 3 signals pointing in the same direction, you have a read.</text>
  <text x="400" y="380" text-anchor="middle" fill="#8A9AB5" font-size="10">Commit before the moment passes. Hesitation turns certainty into a question.</text>

  <!-- Footer -->
  <text x="400" y="415" text-anchor="middle" fill="#3A4A5C" font-size="8">THE ARCHITECTURE OF WONDER  |  DECODE BEHAVIOR</text>
</svg>