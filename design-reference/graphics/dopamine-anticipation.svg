<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="Calibri, sans-serif">
  <defs>
    <linearGradient id="bgGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080F1A"/>
      <stop offset="100%" stop-color="#0D1E30"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="440" fill="url(#bgGrad3)" rx="8"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#C9A84C" font-size="13" letter-spacing="4" font-weight="bold">THE ARCHITECTURE OF ANTICIPATION</text>
  <line x1="220" y1="55" x2="580" y2="55" stroke="#C9A84C" stroke-width="0.5" opacity="0.6"/>
  <text x="400" y="72" text-anchor="middle" fill="#8A9AB5" font-size="11">Dopamine fires at the cue, not the reward  (Schultz, 1997)</text>

  <!-- Visual equation -->
  <!-- CUE box -->
  <rect x="60" y="110" width="160" height="100" rx="6" fill="#0D1E30" stroke="#E8C870" stroke-width="2"/>
  <text x="140" y="145" text-anchor="middle" fill="#E8C870" font-size="28" font-weight="bold">CUE</text>
  <text x="140" y="170" text-anchor="middle" fill="#8A9AB5" font-size="10">Prediction signal</text>
  <text x="140" y="185" text-anchor="middle" fill="#8A9AB5" font-size="10">fires here</text>
  <rect x="95" y="195" width="90" height="5" rx="2" fill="#E8C870"/>

  <!-- Arrow -->
  <text x="255" y="165" text-anchor="middle" fill="#3A4A5C" font-size="30">&gt;</text>

  <!-- BUILD box -->
  <rect x="290" y="110" width="220" height="100" rx="6" fill="#0D1E30" stroke="#1A8FA8" stroke-width="2"/>
  <text x="400" y="140" text-anchor="middle" fill="#1A8FA8" font-size="22" font-weight="bold">ANTICIPATION</text>
  <text x="400" y="162" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">Peak dopamine</text>
  <text x="400" y="180" text-anchor="middle" fill="#8A9AB5" font-size="10">The build IS the experience</text>
  <rect x="310" y="195" width="180" height="5" rx="2" fill="#1A8FA8"/>

  <!-- Arrow -->
  <text x="545" y="165" text-anchor="middle" fill="#3A4A5C" font-size="30">&gt;</text>

  <!-- REVEAL box -->
  <rect x="580" y="110" width="160" height="100" rx="6" fill="#0D1E30" stroke="#3A4A5C" stroke-width="1.5"/>
  <text x="660" y="145" text-anchor="middle" fill="#6B7A8D" font-size="22" font-weight="bold">REVEAL</text>
  <text x="660" y="168" text-anchor="middle" fill="#6B7A8D" font-size="10">Dopamine drops</text>
  <text x="660" y="183" text-anchor="middle" fill="#6B7A8D" font-size="10">(not the peak)</text>
  <rect x="615" y="195" width="90" height="5" rx="2" fill="#3A4A5C" opacity="0.5"/>

  <!-- Dopamine timeline -->
  <line x1="80" y1="280" x2="720" y2="280" stroke="#3A4A5C" stroke-width="1"/>
  <line x1="80" y1="280" x2="80" y2="240" stroke="#3A4A5C" stroke-width="1"/>

  <!-- Dopamine curve -->
  <path d="M 80,275 L 160,275 C 180,275 200,270 230,260 S 300,240 380,242 S 440,238 480,244 C 500,248 530,265 560,270 L 580,275 C 600,276 640,277 720,278"
        fill="none" stroke="#E8C870" stroke-width="2.5"/>

  <!-- Peak marker -->
  <circle cx="380" cy="242" r="5" fill="#E8C870"/>
  <line x1="380" y1="248" x2="380" y2="280" stroke="#E8C870" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="380" y="232" text-anchor="middle" fill="#E8C870" font-size="9" font-weight="bold">PEAK</text>

  <!-- Drop marker -->
  <circle cx="560" cy="270" r="4" fill="#A83030"/>
  <line x1="560" y1="275" x2="560" y2="280" stroke="#A83030" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="560" y="260" text-anchor="middle" fill="#A83030" font-size="9">DROP</text>

  <!-- Labels under timeline -->
  <text x="160" y="296" text-anchor="middle" fill="#8A9AB5" font-size="9">Cue</text>
  <text x="380" y="296" text-anchor="middle" fill="#E8C870" font-size="9">Build</text>
  <text x="560" y="296" text-anchor="middle" fill="#A83030" font-size="9">Reveal</text>

  <!-- Three key principles -->
  <rect x="60" y="320" width="210" height="75" rx="4" fill="#E8C870" opacity="0.08"/>
  <text x="165" y="342" text-anchor="middle" fill="#E8C870" font-size="10" font-weight="bold">PREMATURE RESOLUTION</text>
  <text x="165" y="358" text-anchor="middle" fill="#8A9AB5" font-size="9">Releasing before peak</text>
  <text x="165" y="372" text-anchor="middle" fill="#8A9AB5" font-size="9">intensity wastes the build</text>

  <rect x="295" y="320" width="210" height="75" rx="4" fill="#1A8FA8" opacity="0.08"/>
  <text x="400" y="342" text-anchor="middle" fill="#1A8FA8" font-size="10" font-weight="bold">INTERMITTENT REWARD</text>
  <text x="400" y="358" text-anchor="middle" fill="#8A9AB5" font-size="9">Variable timing keeps</text>
  <text x="400" y="372" text-anchor="middle" fill="#8A9AB5" font-size="9">dopamine system active</text>

  <rect x="530" y="320" width="210" height="75" rx="4" fill="#6B52A0" opacity="0.08"/>
  <text x="635" y="342" text-anchor="middle" fill="#6B52A0" font-size="10" font-weight="bold">MAP BACKWARD</text>
  <text x="635" y="358" text-anchor="middle" fill="#8A9AB5" font-size="9">Start with the reveal, find</text>
  <text x="635" y="372" text-anchor="middle" fill="#8A9AB5" font-size="9">the earliest anticipation point</text>

  <!-- Bottom quote -->
  <text x="400" y="422" text-anchor="middle" fill="#C9A84C" font-size="10" font-style="italic">"Every performer who rushes to the reveal is cutting the best part of the experience short."</text>
</svg>