<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Georgia', 'Garamond', serif">
  <defs>
    <linearGradient id="metaBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050A12"/>
      <stop offset="100%" stop-color="#0A1520"/>
    </linearGradient>
    <linearGradient id="goldGlowM" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C9A84C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowM">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- THE META REVEAL — Final Spread                      -->
  <!-- Full dark background. The standing ovation moment.  -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Full dark spread — both pages -->
  <rect width="1200" height="800" fill="url(#metaBg)"/>

  <!-- Spine indicator (very subtle) -->
  <line x1="600" y1="0" x2="600" y2="800" stroke="#1A2535" stroke-width="1"/>

  <!-- ═══════════ VERSO (LEFT PAGE) ═══════════ -->
  <!-- The design breakdown list -->

  <!-- Section header -->
  <text x="80" y="80" fill="#3A4A5C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="10" letter-spacing="6">THE META REVEAL</text>
  <rect x="80" y="95" width="100" height="1" fill="#C9A84C" opacity="0.4"/>

  <!-- Opening line -->
  <text x="80" y="140" fill="#8A9AB5" font-size="12" font-style="italic">"This is the part where I tell you what I did."</text>

  <!-- Design element breakdown — each line a reveal -->
  <g fill="#8A9AB5" font-size="10">
    <text x="80" y="200">The</text>
    <text x="102" y="200" fill="#C9A84C" font-weight="600">gold accents</text>
    <text x="194" y="200">that drew your eye to key terms</text>

    <text x="120" y="222" fill="#3A4A5C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="8" letter-spacing="2">SALIENCE ARCHITECTURE</text>

    <text x="80" y="264">The</text>
    <text x="102" y="264" fill="#C9A84C" font-weight="600">cool-to-warm color arc</text>
    <text x="270" y="264">across seven parts</text>

    <text x="120" y="286" fill="#3A4A5C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="8" letter-spacing="2">BEHAVIORAL PRIMING</text>

    <text x="80" y="328">The</text>
    <text x="102" y="328" fill="#C9A84C" font-weight="600">chapter hooks</text>
    <text x="208" y="328">that opened every chapter</text>

    <text x="120" y="350" fill="#3A4A5C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="8" letter-spacing="2">SERIAL POSITION — PRIMACY</text>

    <text x="80" y="392">The</text>
    <text x="102" y="392" fill="#C9A84C" font-weight="600">key reads</text>
    <text x="175" y="392">that closed every chapter</text>

    <text x="120" y="414" fill="#3A4A5C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="8" letter-spacing="2">SERIAL POSITION — RECENCY</text>

    <text x="80" y="456">The</text>
    <text x="102" y="456" fill="#C9A84C" font-weight="600">dark pages</text>
    <text x="185" y="456">every eight to twelve pages</text>

    <text x="120" y="478" fill="#3A4A5C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="8" letter-spacing="2">VON RESTORFF ISOLATION EFFECT</text>

    <text x="80" y="520">The</text>
    <text x="102" y="520" fill="#C9A84C" font-weight="600">margin icons</text>
    <text x="201" y="520">you stopped noticing</text>

    <text x="120" y="542" fill="#3A4A5C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="8" letter-spacing="2">REPETITIVE PRIMING</text>

    <text x="80" y="584">The</text>
    <text x="102" y="584" fill="#C9A84C" font-weight="600">readable fonts</text>
    <text x="214" y="584">on cream paper</text>

    <text x="120" y="606" fill="#3A4A5C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="8" letter-spacing="2">PROCESSING FLUENCY — 40% TRUST INCREASE</text>

    <text x="80" y="648">The</text>
    <text x="102" y="648" fill="#C9A84C" font-weight="600">hidden text</text>
    <text x="188" y="648">on the cover</text>

    <text x="120" y="670" fill="#3A4A5C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="8" letter-spacing="2">THE OBSERVATION TEST</text>
  </g>

  <!-- ═══════════ RECTO (RIGHT PAGE) ═══════════ -->
  <!-- The culmination — the standing ovation -->

  <!-- Gold accent lines -->
  <rect x="700" y="250" width="400" height="0.5" fill="url(#goldGlowM)"/>

  <!-- The closing statement -->
  <text x="900" y="320" text-anchor="middle" fill="#C9A84C" font-size="16" font-style="italic" filter="url(#glowM)">This book was not just written.</text>

  <rect x="750" y="350" width="300" height="0.5" fill="url(#goldGlowM)"/>

  <text x="900" y="420" text-anchor="middle" fill="#C9A84C" font-size="16" font-style="italic" filter="url(#glowM)">It was designed to read you</text>
  <text x="900" y="450" text-anchor="middle" fill="#C9A84C" font-size="16" font-style="italic" filter="url(#glowM)">while you read it.</text>

  <rect x="750" y="480" width="300" height="0.5" fill="url(#goldGlowM)"/>

  <!-- The final line — largest, most prominent -->
  <text x="900" y="560" text-anchor="middle" fill="#C9A84C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="18" font-weight="700" letter-spacing="4" filter="url(#glowM)">AND NOW YOU KNOW HOW.</text>

  <rect x="700" y="590" width="400" height="0.5" fill="url(#goldGlowM)"/>

  <!-- The four margin icons one final time — at full opacity now -->
  <g transform="translate(780, 640)">
    <!-- BP -->
    <ellipse cx="12" cy="8" rx="6" ry="4" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
    <circle cx="12" cy="8" r="2" fill="#C9A84C"/>
    <text x="12" y="26" text-anchor="middle" fill="#C9A84C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="7" letter-spacing="1">BP</text>
  </g>
  <g transform="translate(850, 640)">
    <!-- CR -->
    <circle cx="12" cy="5" r="4" fill="none" stroke="#1A8FA8" stroke-width="0.8"/>
    <path d="M5,16 Q5,10 12,10 Q19,10 19,16" fill="none" stroke="#1A8FA8" stroke-width="0.8"/>
    <text x="12" y="26" text-anchor="middle" fill="#1A8FA8" font-family="'Montserrat', 'Calibri', sans-serif" font-size="7" letter-spacing="1">CR</text>
  </g>
  <g transform="translate(920, 640)">
    <!-- VS -->
    <path d="M3,8 L6,4 L8,12 L10,3 L12,13 L14,5 L16,10 L19,8" fill="none" stroke="#6B52A0" stroke-width="0.8"/>
    <text x="11" y="26" text-anchor="middle" fill="#6B52A0" font-family="'Montserrat', 'Calibri', sans-serif" font-size="7" letter-spacing="1">VS</text>
  </g>
  <g transform="translate(990, 640)">
    <!-- AM -->
    <path d="M4,8 L18,8 M14,3 L19,8 L14,13" fill="none" stroke="#A83030" stroke-width="1"/>
    <text x="11" y="26" text-anchor="middle" fill="#A83030" font-family="'Montserrat', 'Calibri', sans-serif" font-size="7" letter-spacing="1">AM</text>
  </g>

  <!-- Footer -->
  <text x="300" y="770" text-anchor="middle" fill="#3A4A5C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="7" letter-spacing="2">THE ARCHITECTURE OF WONDER  |  DECODE BEHAVIOR</text>
  <text x="900" y="770" text-anchor="middle" fill="#3A4A5C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="7" letter-spacing="2">THE ARCHITECTURE OF WONDER  |  DECODE BEHAVIOR</text>

  <!-- Bottom annotation -->
  <rect x="0" y="785" width="1200" height="15" fill="#030710"/>
  <text x="600" y="795" text-anchor="middle" fill="#C9A84C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="7" letter-spacing="1">THE META REVEAL SPREAD  |  VERSO: DESIGN BREAKDOWN  |  RECTO: STANDING OVATION  |  FULL DARK BACKGROUND  |  GOLD TYPOGRAPHY WITH GLOW</text>
</svg>