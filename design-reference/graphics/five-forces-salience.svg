<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Calibri, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080F1A"/>
      <stop offset="100%" stop-color="#0D1E30"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" fill="#C9A84C" font-size="13" letter-spacing="4" font-weight="bold">THE FIVE FORCES OF SALIENCE</text>
  <line x1="250" y1="65" x2="550" y2="65" stroke="#C9A84C" stroke-width="0.5" opacity="0.6"/>
  <text x="400" y="84" text-anchor="middle" fill="#8A9AB5" font-size="11">What makes the brain say "this matters"</text>

  <!-- Central brain node -->
  <circle cx="400" cy="310" r="70" fill="none" stroke="#1A8FA8" stroke-width="2" opacity="0.8"/>
  <circle cx="400" cy="310" r="55" fill="#0D1E30" stroke="#1A8FA8" stroke-width="1" opacity="0.5"/>
  <text x="400" y="300" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold">SALIENCE</text>
  <text x="400" y="316" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold">NETWORK</text>
  <text x="400" y="336" text-anchor="middle" fill="#8A9AB5" font-size="9">Anterior Insula +</text>
  <text x="400" y="348" text-anchor="middle" fill="#8A9AB5" font-size="9">Dorsal ACC</text>

  <!-- Force 1: Novelty (top) -->
  <line x1="400" y1="240" x2="400" y2="165" stroke="#E8C870" stroke-width="1.5" opacity="0.6"/>
  <circle cx="400" cy="145" r="40" fill="#0D1E30" stroke="#E8C870" stroke-width="2"/>
  <text x="400" y="130" text-anchor="middle" fill="#E8C870" font-size="11" font-weight="bold">01</text>
  <text x="400" y="148" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">NOVELTY</text>
  <text x="400" y="163" text-anchor="middle" fill="#8A9AB5" font-size="8">Orienting response</text>

  <!-- Force 2: Emotional Relevance (top right) -->
  <line x1="455" y1="260" x2="560" y2="195" stroke="#A83030" stroke-width="1.5" opacity="0.6"/>
  <circle cx="580" cy="180" r="40" fill="#0D1E30" stroke="#A83030" stroke-width="2"/>
  <text x="580" y="165" text-anchor="middle" fill="#A83030" font-size="11" font-weight="bold">02</text>
  <text x="580" y="180" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold">EMOTIONAL</text>
  <text x="580" y="194" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold">RELEVANCE</text>
  <text x="580" y="209" text-anchor="middle" fill="#8A9AB5" font-size="8">Amygdala activation</text>

  <!-- Force 3: Social Signal (bottom right) -->
  <line x1="455" y1="355" x2="560" y2="420" stroke="#6B52A0" stroke-width="1.5" opacity="0.6"/>
  <circle cx="580" cy="440" r="40" fill="#0D1E30" stroke="#6B52A0" stroke-width="2"/>
  <text x="580" y="425" text-anchor="middle" fill="#6B52A0" font-size="11" font-weight="bold">03</text>
  <text x="580" y="440" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold">SOCIAL</text>
  <text x="580" y="454" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold">SIGNAL</text>
  <text x="580" y="469" text-anchor="middle" fill="#8A9AB5" font-size="8">Status &amp; intent eval</text>

  <!-- Force 4: Unresolved Uncertainty (bottom left) -->
  <line x1="345" y1="355" x2="240" y2="420" stroke="#1A8FA8" stroke-width="1.5" opacity="0.6"/>
  <circle cx="220" cy="440" r="40" fill="#0D1E30" stroke="#1A8FA8" stroke-width="2"/>
  <text x="220" y="425" text-anchor="middle" fill="#1A8FA8" font-size="11" font-weight="bold">04</text>
  <text x="220" y="440" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold">UNRESOLVED</text>
  <text x="220" y="454" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold">UNCERTAINTY</text>
  <text x="220" y="469" text-anchor="middle" fill="#8A9AB5" font-size="8">Zeigarnik effect</text>

  <!-- Force 5: Contrast (top left) -->
  <line x1="345" y1="260" x2="240" y2="195" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  <circle cx="220" cy="180" r="40" fill="#0D1E30" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
  <text x="220" y="165" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" opacity="0.7">05</text>
  <text x="220" y="183" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">CONTRAST</text>
  <text x="220" y="198" text-anchor="middle" fill="#8A9AB5" font-size="8">Change detection</text>

  <!-- Bottom instruction -->
  <rect x="180" y="530" width="440" height="40" rx="4" fill="#C9A84C" opacity="0.12"/>
  <text x="400" y="555" text-anchor="middle" fill="#C9A84C" font-size="11" font-weight="bold">Your opening 60 seconds should engage at least 3 of the 5 simultaneously</text>

  <!-- Stats -->
  <text x="50" y="580" fill="#8A9AB5" font-size="9">11M bits/sec sensory input</text>
  <text x="750" y="580" text-anchor="end" fill="#8A9AB5" font-size="9">50 bits/sec conscious awareness</text>
</svg>