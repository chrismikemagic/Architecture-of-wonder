<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Georgia', 'Garamond', serif">
  <defs>
    <linearGradient id="darkBgRV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080F1A"/>
      <stop offset="100%" stop-color="#0D1E30"/>
    </linearGradient>
    <linearGradient id="goldGlowRV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C9A84C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- RECTO-VERSO SPREAD: Part Opener + Ten-Second Scan      -->
  <!-- Demonstrates: Spread composition, page-turn suspense,  -->
  <!-- recto bias, priming, progressive disclosure             -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- ═══════════ VERSO (LEFT) — Part Opener ═══════════ -->
  <rect x="0" y="0" width="600" height="800" fill="url(#darkBgRV)"/>

  <!-- Part number — very subtle -->
  <text x="300" y="280" text-anchor="middle" fill="#3A4A5C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="11" letter-spacing="8" font-weight="300">PART TWO</text>

  <!-- Gold accent line -->
  <rect x="220" y="300" width="160" height="0.5" fill="url(#goldGlowRV)"/>

  <!-- Part title — large, gold -->
  <text x="300" y="375" text-anchor="middle" fill="#C9A84C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="32" font-weight="700" letter-spacing="6">READING</text>
  <text x="300" y="420" text-anchor="middle" fill="#C9A84C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="32" font-weight="700" letter-spacing="6">THE ROOM</text>

  <!-- Thin gold line under title -->
  <rect x="200" y="440" width="200" height="1" fill="#C9A84C" opacity="0.4"/>

  <!-- Epigraph / Part quote -->
  <text x="300" y="490" text-anchor="middle" fill="#8A9AB5" font-size="12" font-style="italic">"Observation is not a passive act.</text>
  <text x="300" y="510" text-anchor="middle" fill="#8A9AB5" font-size="12" font-style="italic">It is a decision to see what is actually there,</text>
  <text x="300" y="530" text-anchor="middle" fill="#8A9AB5" font-size="12" font-style="italic">rather than what you expect."</text>

  <!-- Chapter list for this Part -->
  <text x="300" y="590" text-anchor="middle" fill="#3A4A5C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="9" letter-spacing="2">CHAPTERS 6–10b</text>
  <text x="300" y="615" text-anchor="middle" fill="#3A4A5C" font-family="'Helvetica Neue', 'Calibri', sans-serif" font-size="8" font-weight="300">Behavioral Profiling in Real Time</text>
  <text x="300" y="630" text-anchor="middle" fill="#3A4A5C" font-family="'Helvetica Neue', 'Calibri', sans-serif" font-size="8" font-weight="300">Cold Reading, Warm Reading, and Thin Slicing</text>
  <text x="300" y="645" text-anchor="middle" fill="#3A4A5C" font-family="'Helvetica Neue', 'Calibri', sans-serif" font-size="8" font-weight="300">The Micro-Expression Matrix</text>
  <text x="300" y="660" text-anchor="middle" fill="#3A4A5C" font-family="'Helvetica Neue', 'Calibri', sans-serif" font-size="8" font-weight="300">Volunteer Handling Through a Neural Lens</text>
  <text x="300" y="675" text-anchor="middle" fill="#3A4A5C" font-family="'Helvetica Neue', 'Calibri', sans-serif" font-size="8" font-weight="300">The Language of Compliance</text>
  <text x="300" y="690" text-anchor="middle" fill="#3A4A5C" font-family="'Helvetica Neue', 'Calibri', sans-serif" font-size="8" font-weight="300">The Neuroscience of Hypnosis</text>

  <!-- Footer -->
  <text x="300" y="770" text-anchor="middle" fill="#3A4A5C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="7" letter-spacing="2">THE ARCHITECTURE OF WONDER  |  DECODE BEHAVIOR</text>

  <!-- ═══════════ RECTO (RIGHT) — Ten-Second Scan ═══════════ -->
  <!-- This is the page the reader sees on the right when they open to the Part -->
  <!-- Recto bias: this page gets MORE visual attention -->

  <rect x="600" y="0" width="600" height="800" fill="#F5F0E8"/>

  <!-- Spine indicator -->
  <line x1="600" y1="0" x2="600" y2="800" stroke="#D8D0C4" stroke-width="2"/>

  <!-- The photograph placeholder — full page -->
  <rect x="640" y="60" width="520" height="600" rx="2" fill="#E8E0D4" stroke="#D8D0C4" stroke-width="1"/>

  <!-- Placeholder figure -->
  <g transform="translate(900, 200)" opacity="0.3">
    <!-- Silhouette standing -->
    <circle cx="0" cy="0" r="40" fill="#C4B8A8"/>
    <rect x="-30" y="45" width="60" height="100" rx="5" fill="#C4B8A8"/>
    <rect x="-35" y="150" width="25" height="90" rx="3" fill="#C4B8A8"/>
    <rect x="10" y="150" width="25" height="90" rx="3" fill="#C4B8A8"/>
  </g>

  <!-- Observation markers (subtle, will be revealed on next page) -->
  <!-- These are barely visible — just enough to hint -->
  <circle cx="870" cy="360" r="12" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.15"/>
  <text x="870" y="364" text-anchor="middle" fill="#C9A84C" font-size="8" opacity="0.15">1</text>

  <circle cx="920" cy="270" r="12" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.15"/>
  <text x="920" y="274" text-anchor="middle" fill="#C9A84C" font-size="8" opacity="0.15">2</text>

  <circle cx="900" cy="450" r="12" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.15"/>
  <text x="900" y="454" text-anchor="middle" fill="#C9A84C" font-size="8" opacity="0.15">3</text>

  <!-- Instruction text -->
  <text x="900" y="710" text-anchor="middle" fill="#C9A84C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="14" font-weight="600" letter-spacing="2">WHAT DO YOU NOTICE?</text>
  <text x="900" y="738" text-anchor="middle" fill="#8A9AB5" font-size="11" font-style="italic">Take ten seconds. Then turn the page.</text>

  <!-- Design annotations -->
  <rect x="610" y="780" width="575" height="15" fill="none"/>
  <text x="900" y="790" text-anchor="middle" fill="#D8D0C4" font-family="'Montserrat', 'Calibri', sans-serif" font-size="7" letter-spacing="2">THE ARCHITECTURE OF WONDER  |  TEN-SECOND SCAN EXERCISE</text>

  <!-- ═══════════ DESIGN ANNOTATIONS ═══════════ -->

  <!-- Annotation: Recto page bias -->
  <rect x="605" y="30" width="180" height="20" rx="3" fill="#C9A84C" opacity="0.1"/>
  <text x="610" y="44" fill="#C9A84C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="7" letter-spacing="1" opacity="0.6">RECTO PAGE — MORE VISUAL ATTENTION</text>

  <!-- Annotation: Page turn suspense -->
  <g transform="translate(1130, 400)" opacity="0.5">
    <rect x="0" y="0" width="60" height="40" rx="3" fill="#C9A84C" opacity="0.1"/>
    <text x="5" y="14" fill="#C9A84C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="6" letter-spacing="0.5">PAGE TURN</text>
    <text x="5" y="24" fill="#C9A84C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="6" letter-spacing="0.5">= SUSPENSE</text>
    <text x="5" y="34" fill="#C9A84C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="6" letter-spacing="0.5">MECHANISM</text>
  </g>

  <!-- Annotation: Verso for context, Recto for action -->
  <g transform="translate(5, 30)" opacity="0.5">
    <rect x="0" y="0" width="180" height="20" rx="3" fill="#C9A84C" opacity="0.1"/>
    <text x="5" y="14" fill="#C9A84C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="7" letter-spacing="1">VERSO — CONTEXT &amp; PRIMING</text>
  </g>

  <!-- Bottom annotation bar -->
  <rect x="0" y="785" width="1200" height="15" fill="#080F1A"/>
  <text x="600" y="795" text-anchor="middle" fill="#C9A84C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="7" letter-spacing="1">PART OPENER SPREAD  |  VERSO: DARK CONTEXT  |  RECTO: TEN-SECOND SCAN (RECTO BIAS)  |  PAGE TURN CREATES SUSPENSE FOR ANNOTATIONS</text>
</svg>