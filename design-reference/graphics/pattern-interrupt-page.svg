<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="'Georgia', 'Garamond', serif">
  <defs>
    <linearGradient id="deepBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060B14"/>
      <stop offset="100%" stop-color="#0D1E30"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C9A84C" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full-bleed dark page — the pattern interrupt -->
  <rect width="600" height="800" fill="url(#deepBg)"/>

  <!-- Subtle gold glow line -->
  <rect x="100" y="340" width="400" height="1" fill="url(#goldLine)"/>

  <!-- The single stat — Von Restorff isolation -->
  <text x="300" y="310" text-anchor="middle" fill="#C9A84C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="96" font-weight="200" filter="url(#glow)">250</text>
  <text x="300" y="330" text-anchor="middle" fill="#C9A84C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="14" letter-spacing="3" font-weight="300">MILLISECONDS</text>

  <rect x="100" y="355" width="400" height="1" fill="url(#goldLine)"/>

  <!-- Supporting text — minimal -->
  <text x="300" y="400" text-anchor="middle" fill="#8A9AB5" font-size="12" font-style="italic">The time it takes your brain to form</text>
  <text x="300" y="420" text-anchor="middle" fill="#8A9AB5" font-size="12" font-style="italic">a first impression of a stranger.</text>

  <text x="300" y="460" text-anchor="middle" fill="#3A4A5C" font-size="10">Willis &amp; Todorov, 2006 — Psychological Science</text>

  <!-- "What You Just Did" moment -->
  <text x="300" y="540" text-anchor="middle" fill="#FFFFFF" font-size="11" font-style="italic">You formed yours of this page in less time than that.</text>
  <text x="300" y="565" text-anchor="middle" fill="#C9A84C" font-size="10">What did you notice first — the number, or the word?</text>
  <text x="300" y="585" text-anchor="middle" fill="#C9A84C" font-size="10">That is salience at work.</text>

  <!-- Footer -->
  <text x="300" y="770" text-anchor="middle" fill="#3A4A5C" font-family="'Montserrat', 'Calibri', sans-serif" font-size="8" letter-spacing="2">THE ARCHITECTURE OF WONDER  |  DECODE BEHAVIOR</text>
</svg>
