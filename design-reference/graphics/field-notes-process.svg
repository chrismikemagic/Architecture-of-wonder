<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Calibri, sans-serif">
  <defs>
    <linearGradient id="bgGrad7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080F1A"/>
      <stop offset="100%" stop-color="#0D1E30"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad7)" rx="8"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#C9A84C" font-size="13" letter-spacing="4" font-weight="bold">FIELD NOTES CARD SYSTEM</text>
  <line x1="260" y1="55" x2="540" y2="55" stroke="#C9A84C" stroke-width="0.5" opacity="0.6"/>
  <text x="400" y="72" text-anchor="middle" fill="#8A9AB5" font-size="11">Brain-behavior concepts paired with direct application</text>

  <!-- Card template structure -->
  <!-- Card 1: IN THE BRAIN -->
  <rect x="40" y="100" width="220" height="290" rx="6" fill="#0D1E30" stroke="#1A8FA8" stroke-width="2"/>

  <!-- Card header -->
  <rect x="40" y="100" width="220" height="40" rx="6" fill="#1A8FA8" opacity="0.15"/>
  <rect x="40" y="134" width="220" height="6" fill="#1A8FA8" opacity="0.3"/>
  <text x="150" y="125" text-anchor="middle" fill="#1A8FA8" font-size="12" font-weight="bold">IN THE BRAIN</text>

  <text x="60" y="165" fill="#FFFFFF" font-size="10" font-weight="bold">The Neuroscience</text>
  <line x1="60" y1="172" x2="240" y2="172" stroke="#1A8FA8" stroke-width="0.5" opacity="0.3"/>

  <text x="60" y="190" fill="#8A9AB5" font-size="9">The anterior insula and dorsal</text>
  <text x="60" y="204" fill="#8A9AB5" font-size="9">anterior cingulate cortex form</text>
  <text x="60" y="218" fill="#8A9AB5" font-size="9">the salience network: the system</text>
  <text x="60" y="232" fill="#8A9AB5" font-size="9">that scans everything and asks</text>
  <text x="60" y="246" fill="#8A9AB5" font-size="9">"What matters here?"</text>

  <rect x="55" y="260" width="190" height="24" rx="3" fill="#1A8FA8" opacity="0.08"/>
  <text x="150" y="276" text-anchor="middle" fill="#1A8FA8" font-size="8" font-weight="bold">RESEARCH: Friston (Free Energy)</text>

  <text x="60" y="310" fill="#FFFFFF" font-size="9" font-weight="bold">KEY METRIC</text>
  <text x="60" y="328" fill="#E8C870" font-size="16" font-weight="bold">11M</text>
  <text x="110" y="328" fill="#8A9AB5" font-size="9">bits/sec sensory input</text>
  <text x="60" y="348" fill="#E8C870" font-size="16" font-weight="bold">50</text>
  <text x="85" y="348" fill="#8A9AB5" font-size="9">bits reach awareness</text>

  <!-- Arrow -->
  <line x1="265" y1="245" x2="285" y2="245" stroke="#C9A84C" stroke-width="1.5"/>
  <polygon points="283,241 291,245 283,249" fill="#C9A84C"/>

  <!-- Card 2: ON STAGE -->
  <rect x="290" y="100" width="220" height="290" rx="6" fill="#0D1E30" stroke="#E8C870" stroke-width="2"/>

  <rect x="290" y="100" width="220" height="40" rx="6" fill="#E8C870" opacity="0.12"/>
  <rect x="290" y="134" width="220" height="6" fill="#E8C870" opacity="0.3"/>
  <text x="400" y="125" text-anchor="middle" fill="#E8C870" font-size="12" font-weight="bold">ON STAGE</text>

  <text x="310" y="165" fill="#FFFFFF" font-size="10" font-weight="bold">The Application</text>
  <line x1="310" y1="172" x2="490" y2="172" stroke="#E8C870" stroke-width="0.5" opacity="0.3"/>

  <text x="310" y="190" fill="#8A9AB5" font-size="9">Your opening 60 seconds should</text>
  <text x="310" y="204" fill="#8A9AB5" font-size="9">engage at least three of the five</text>
  <text x="310" y="218" fill="#8A9AB5" font-size="9">forces simultaneously:</text>

  <text x="310" y="240" fill="#E8C870" font-size="9" font-weight="bold">1. Novelty</text>
  <text x="390" y="240" fill="#8A9AB5" font-size="9">— Unexpected action</text>
  <text x="310" y="256" fill="#E8C870" font-size="9" font-weight="bold">2. Social Signal</text>
  <text x="415" y="256" fill="#8A9AB5" font-size="9">— Direct eye contact</text>
  <text x="310" y="272" fill="#E8C870" font-size="9" font-weight="bold">3. Contrast</text>
  <text x="390" y="272" fill="#8A9AB5" font-size="9">— Silence as entry</text>

  <rect x="305" y="290" width="190" height="24" rx="3" fill="#E8C870" opacity="0.08"/>
  <text x="400" y="306" text-anchor="middle" fill="#E8C870" font-size="8" font-weight="bold">TEST: Room goes quiet in 10 seconds</text>

  <text x="310" y="340" fill="#FFFFFF" font-size="9" font-weight="bold">FAILURE MODE</text>
  <text x="310" y="358" fill="#A83030" font-size="9">Competing with background noise</text>
  <text x="310" y="372" fill="#A83030" font-size="9">instead of commanding attention</text>

  <!-- Arrow -->
  <line x1="515" y1="245" x2="535" y2="245" stroke="#C9A84C" stroke-width="1.5"/>
  <polygon points="533,241 541,245 533,249" fill="#C9A84C"/>

  <!-- Card 3: CM TAKEAWAY -->
  <rect x="540" y="100" width="220" height="290" rx="6" fill="#0D1E30" stroke="#C9A84C" stroke-width="2"/>

  <rect x="540" y="100" width="220" height="40" rx="6" fill="#C9A84C" opacity="0.12"/>
  <rect x="540" y="134" width="220" height="6" fill="#C9A84C" opacity="0.3"/>
  <text x="650" y="125" text-anchor="middle" fill="#C9A84C" font-size="12" font-weight="bold">CM TAKEAWAY</text>

  <text x="560" y="165" fill="#FFFFFF" font-size="10" font-weight="bold">The Performer's Edge</text>
  <line x1="560" y1="172" x2="740" y2="172" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>

  <text x="560" y="195" fill="#C9A84C" font-size="10" font-style="italic">"Imagine I suddenly fell</text>
  <text x="560" y="211" fill="#C9A84C" font-size="10" font-style="italic">silent, looked you dead in</text>
  <text x="560" y="227" fill="#C9A84C" font-size="10" font-style="italic">the eyes, and threw my</text>
  <text x="560" y="243" fill="#C9A84C" font-size="10" font-style="italic">keys at the wall."</text>

  <text x="560" y="275" fill="#8A9AB5" font-size="9">Before you could explain it,</text>
  <text x="560" y="291" fill="#8A9AB5" font-size="9">your nervous system would</text>
  <text x="560" y="307" fill="#8A9AB5" font-size="9">already have tagged the event</text>
  <text x="560" y="323" fill="#8A9AB5" font-size="9">as important, unusual, and</text>
  <text x="560" y="339" fill="#8A9AB5" font-size="9">potentially meaningful.</text>

  <rect x="555" y="355" width="190" height="24" rx="3" fill="#C9A84C" opacity="0.08"/>
  <text x="650" y="371" text-anchor="middle" fill="#C9A84C" font-size="8" font-weight="bold">DESIGN THE GAP DELIBERATELY</text>

  <!-- Process flow below -->
  <text x="400" y="425" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">CARD FLOW: USE BEFORE EVERY PERFORMANCE</text>

  <!-- Flow steps -->
  <rect x="60" y="445" width="140" height="30" rx="15" fill="#1A8FA8" opacity="0.2"/>
  <text x="130" y="464" text-anchor="middle" fill="#1A8FA8" font-size="9" font-weight="bold">Read the Science</text>

  <line x1="205" y1="460" x2="225" y2="460" stroke="#3A4A5C" stroke-width="1"/>
  <polygon points="223,457 229,460 223,463" fill="#3A4A5C"/>

  <rect x="230" y="445" width="140" height="30" rx="15" fill="#E8C870" opacity="0.2"/>
  <text x="300" y="464" text-anchor="middle" fill="#E8C870" font-size="9" font-weight="bold">Plan the Action</text>

  <line x1="375" y1="460" x2="395" y2="460" stroke="#3A4A5C" stroke-width="1"/>
  <polygon points="393,457 399,460 393,463" fill="#3A4A5C"/>

  <rect x="400" y="445" width="140" height="30" rx="15" fill="#C9A84C" opacity="0.2"/>
  <text x="470" y="464" text-anchor="middle" fill="#C9A84C" font-size="9" font-weight="bold">Commit to the Read</text>

  <line x1="545" y1="460" x2="565" y2="460" stroke="#3A4A5C" stroke-width="1"/>
  <polygon points="563,457 569,460 563,463" fill="#3A4A5C"/>

  <rect x="570" y="445" width="170" height="30" rx="15" fill="#6B52A0" opacity="0.2"/>
  <text x="655" y="464" text-anchor="middle" fill="#6B52A0" font-size="9" font-weight="bold">Audit After the Show</text>

  <!-- Footer -->
  <text x="400" y="495" text-anchor="middle" fill="#3A4A5C" font-size="8">THE ARCHITECTURE OF WONDER  |  DECODE BEHAVIOR</text>
</svg>